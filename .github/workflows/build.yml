name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install nuitka
        pip install -r requirements.txt
    
    - name: Build EXE with Nuitka
      run: |
        nuitka --standalone --onefile --windows-disable-console --windows-icon-from-ico=NONE --output-dir=build --output-filename=BeijingClock.exe beijing_clock.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: BeijingClock-Windows
        path: build/BeijingClock.exe
