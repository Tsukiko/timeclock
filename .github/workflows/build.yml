name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
    
    - name: Create C# project file
      shell: cmd
      run: |
        echo ^<Project Sdk="Microsoft.NET.Sdk"^> > BeijingClock.csproj
        echo   ^<PropertyGroup^> >> BeijingClock.csproj
        echo     ^<OutputType^>WinExe^</OutputType^> >> BeijingClock.csproj
        echo     ^<TargetFramework^>net48^</TargetFramework^> >> BeijingClock.csproj
        echo     ^<UseWindowsForms^>true^</UseWindowsForms^> >> BeijingClock.csproj
        echo     ^<LangVersion^>7.3^</LangVersion^> >> BeijingClock.csproj
        echo   ^</PropertyGroup^> >> BeijingClock.csproj
        echo ^</Project^> >> BeijingClock.csproj
    
    - name: Build EXE
      run: msbuild BeijingClock.csproj /p:Configuration=Release /p:OutputPath=./bin /p:AssemblyName=BeijingClock
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: BeijingClock-Windows
        path: bin/BeijingClock.exe
