name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version_type:
        description: '版本类型 (patch/minor/major)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # 创建 version.txt（如果不存在）
    - name: Create version.txt if not exists
      shell: pwsh
      run: |
        if (-not (Test-Path "version.txt")) {
            "2.1.0" | Out-File -FilePath version.txt -NoNewline
            Write-Host "Created version.txt with initial version 2.1.0"
        }
    
    # 读取并自动递增版本号
    - name: Auto increment version
      id: version
      shell: pwsh
      run: |
        # 读取当前版本
        $version = Get-Content version.txt -Raw
        $version = $version.Trim()
        Write-Host "当前版本: $version"
        
        # 解析版本号
        $versionParts = $version.Split('.')
        $major = [int]$versionParts[0]
        $minor = [int]$versionParts[1]
        $patch = [int]$versionParts[2]
        
        # 根据触发方式决定版本递增
        $versionType = "${{ github.event.inputs.version_type }}"
        
        if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            switch ($versionType) {
                'major' { 
                    $major += 1
                    $minor = 0
                    $patch = 0
                }
                'minor' { 
                    $minor += 1
                    $patch = 0
                }
                default { 
                    $patch += 1
                }
            }
        } else {
            # push时自动增加patch版本号
            $patch += 1
        }
        
        $newVersion = "$major.$minor.$patch"
        Write-Host "新版本: $newVersion"
        
        # 保存新版本号
        $newVersion | Out-File -FilePath version.txt -NoNewline
        
        # 获取日期
        $buildDate = Get-Date -Format "yyyy.MM.dd"
        
        # 设置输出变量（GitHub Actions 新版语法）
        echo "version=$newVersion" >> $env:GITHUB_OUTPUT
        echo "major=$major" >> $env:GITHUB_OUTPUT
        echo "minor=$minor" >> $env:GITHUB_OUTPUT
        echo "patch=$patch" >> $env:GITHUB_OUTPUT
        echo "build_date=$buildDate" >> $env:GITHUB_OUTPUT
    
    # 提交版本号更新
    - name: Commit version update
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add version.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
        git push || echo "No changes to push"
    
    # 动态生成带版本号的 C# 代码
    - name: Generate versioned source
      shell: pwsh
      run: |
        $code = Get-Content BeijingClock.cs -Raw
        
        # 替换版本号
        $code = $code -replace 'private const string VERSION = ".*?"', ('private const string VERSION = "' + '${{ steps.version.outputs.version }}' + '"')
        $code = $code -replace 'private const string BUILD_DATE = ".*?"', ('private const string BUILD_DATE = "' + '${{ steps.version.outputs.build_date }}' + '"')
        
        # 替换窗口标题中的版本号显示
        $code = $code -replace '撞车同步器 v[\d\.]+', ('撞车同步器 v' + '${{ steps.version.outputs.version }}')
        
        $code | Out-File -FilePath BeijingClock.cs -Encoding UTF8
    
    - name: Compile with csc.exe
      shell: cmd
      run: |
        "C:\Windows\Microsoft.NET\Framework\v4.0.30319\csc.exe" /target:winexe /out:BeijingClock.exe /reference:System.dll /reference:System.Drawing.dll /reference:System.Windows.Forms.dll /reference:System.Net.Http.dll BeijingClock.cs
    
    - name: Rename EXE with version
      shell: pwsh
      run: |
        $oldName = "BeijingClock.exe"
        $newName = "CrashSync_v${{ steps.version.outputs.version }}.exe"
        Rename-Item -Path $oldName -NewName $newName -ErrorAction SilentlyContinue
        Write-Host "Renamed to: $newName"
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: CrashSync_v${{ steps.version.outputs.version }}
        path: CrashSync_v${{ steps.version.outputs.version }}.exe
