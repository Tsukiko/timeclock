name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Compile with csc.exe
      shell: cmd
      run: |
        dir /s /b "C:\Windows\Microsoft.NET\Framework\v4.0.30319\csc.exe"
        "C:\Windows\Microsoft.NET\Framework\v4.0.30319\csc.exe" /target:winexe /out:BeijingClock.exe /reference:System.dll /reference:System.Drawing.dll /reference:System.Windows.Forms.dll /reference:System.Net.Http.dll BeijingClock.cs
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: BeijingClock-Windows
        path: BeijingClock.exe
